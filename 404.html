<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 100px;
      color: #00d4ff;
    }

    h2 {
      margin-bottom: 10px;
      font-weight: 500;
    }

    p {
      margin-bottom: 30px;
      color: #ccc;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s ease;
    }

    .home-btn {
      background: #00d4ff;
      color: #000;
    }

    .home-btn:hover {
      background: #00a6cc;
    }

    .back-btn {
      background: transparent;
      border: 1px solid #00d4ff;
      color: #00d4ff;
    }

    .back-btn:hover {
      background: #00d4ff;
      color: #000;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 70px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for doesn't exist or has been moved.</p>

    <div class="buttons">
      <button class="home-btn" onclick="goHome()">Go to Home</button>
      <button class="back-btn" onclick="goBack()">Go Back</button>
    </div>
  </div>

  <script>
    function goHome() {
      window.location.href = "index.html"; // change if your home page is different
    }

    function goBack() {
      window.history.back();
    }
  </script>

</body>
</html>
