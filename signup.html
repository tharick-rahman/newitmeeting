<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ITMeet</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body signup-body">
  <div id="loader"><div class="spinner"></div></div>

  <!-- Navbar -->
  <nav class="navbar auth-nav">
    <div class="container">
      <a href="index.html" class="logo">ITMeet</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html" class="btn-outline" style="padding: 6px 16px;">Login</a>
      </div>
    </div>
  </nav>

  <div class="auth-container reveal zoom">
    <div class="auth-card glass-card">
      <div class="auth-header text-center">
        <h2>Create an Account</h2>
        <p>Join the ITMeet engineering network</p>
      </div>

      <form id="signupForm" class="auth-form mt-4">
        
        <div class="error-msg text-center mb-2" id="signupError" style="display:none; color: #ef4444;"></div>

        <div class="input-grp">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Dr. John Doe" required>
        </div>

        <div class="input-grp mt-4">
          <label>Email Address</label>
          <input type="email" id="signupEmail" placeholder="john@company.com" required>
        </div>

        <div class="form-row mt-4">
          <div class="input-grp">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" minlength="6" required>
          </div>
          <div class="input-grp">
            <label>Confirm Password</label>
            <input type="password" id="signupConfirm" placeholder="Re-enter password" required>
          </div>
        </div>
        
        <div class="auth-actions mt-4 text-center" style="display:block;">
          <label><input type="checkbox" required> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn-primary w-100 mt-4">Sign Up</button>
      </form>

      <div class="auth-footer text-center mt-4">
        <p>Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
