<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ITMeet</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
  <div id="loader"><div class="spinner"></div></div>

  <!-- Navbar -->
  <nav class="navbar auth-nav">
    <div class="container">
   <a href="index.html" class="logo">
        <img src="assets/stack logo.png" alt="logo">
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="signup.html" class="btn-primary" style="padding: 6px 16px;">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="auth-container reveal zoom">
    <div class="auth-card glass-card">
      <div class="auth-header text-center">
        <h2>Welcome Back</h2>
        <p>Access your ITMeet dashboard</p>
      </div>

      <form id="loginForm" class="auth-form">
        <!-- Role Selection -->
        <div class="role-selector">
          <label class="role-option">
            <input type="radio" name="role" value="admin" required checked>
            <span class="role-box">Admin</span>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="employee" required>
            <span class="role-box">Employee</span>
          </label>
        </div>

        <div class="input-grp mt-4">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="name@company.com" required>
        </div>
        
        <div class="input-grp mt-4">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" minlength="6" required>
        </div>
        
        <div class="auth-actions mt-4">
          <label><input type="checkbox"> Remember me</label>
          <a href="#" class="forgot-pwd">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary w-100 mt-4">Sign In</button>
      </form>

      <div class="auth-footer text-center mt-4">
        <p>Don't have an account? <a href="signup.html">Create one here</a></p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
